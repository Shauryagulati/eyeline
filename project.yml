# XcodeGen spec for the Eyeline app target. Regenerate the project with:
#   xcodegen generate
# EyelineKit (the tested brain) stays a standalone SwiftPM package; the app links it.
name: Eyeline
options:
  bundleIdPrefix: com.eyeline
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  EyelineKit:
    path: EyelineKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
targets:
  Eyeline:
    type: application
    platform: macOS
    sources:
      - Eyeline
    dependencies:
      - package: EyelineKit
        product: EyelineKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.eyeline.Eyeline
      MARKETING_VERSION: "0.0.1"
      CURRENT_PROJECT_VERSION: "1"
      # FIX #1: pin the app target to Swift 5 language mode, matching EyelineKit's
      # swiftLanguageModes [.v5], so AppKit observer closures capturing @MainActor self
      # don't trip Swift 6 strict-concurrency errors.
      SWIFT_VERSION: "5.0"
      GENERATE_INFOPLIST_FILE: "YES"
      INFOPLIST_KEY_LSUIElement: "YES"
      # App icon (Eyeline/Assets.xcassets/AppIcon.appiconset, generated by scripts/generate_app_icon.swift).
      # A menu-bar (LSUIElement) app normally has no Dock icon, but it flips to a regular app while
      # Settings/Scripts are open — so without this it shows a blank generic icon in the Dock + Cmd-Tab.
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # M2: microphone usage string (voice-gated scrolling). No physical Info.plist — this
      # injects NSMicrophoneUsageDescription via the generated plist. Not sandboxed, so no
      # audio-input entitlement is needed.
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "Eyeline follows your voice to auto-scroll the teleprompter. Audio is processed on-device and never recorded or sent anywhere."
      # Phase 2 Voice mode: on-device speech recognition usage string. Recognition is forced
      # on-device (requiresOnDeviceRecognition), so audio never leaves the Mac.
      INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Eyeline recognizes your speech on-device to follow your place in the script and auto-scroll. Nothing is recorded or sent anywhere."
      # Shown in the About box and Finder ▸ Get Info. Neutral placeholder (no personal attribution)
      # until release — revisit alongside LSApplicationCategoryType when the repo goes public.
      INFOPLIST_KEY_NSHumanReadableCopyright: "Free & open-source · MIT Licensed"
      # Sign to run locally (ad-hoc) — no Apple Developer account needed for this milestone.
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"
# Explicit, shared scheme so `xcodebuild -scheme Eyeline` is reproducible (CI-safe) instead
# of relying on Xcode auto-creating an ephemeral scheme into ignored xcuserdata.
schemes:
  Eyeline:
    build:
      targets:
        Eyeline: all
    run:
      config: Debug
    archive:
      config: Release
